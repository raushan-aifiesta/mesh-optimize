<svg width="680" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
<title>mesh optimize request flow</title>
<desc>Top: today, apps call claude-fable-5 directly and pay full price for every token. Bottom: with mesh optimize, requests pass through a classifier and a cumulative lever stack (cache, effort, compact, reroute, batch) before the provider, and the response returns with a mesh_savings receipt.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="40" y="40" width="600" height="120" rx="8" fill="none" stroke="#888780" stroke-width="0.75" stroke-dasharray="6 4"/>
<text x="56" y="64" font-family="sans-serif" font-size="12" fill="#888780">today: straight to the provider</text>
<rect x="90" y="84" width="160" height="56" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.75"/>
<text x="170" y="108" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">your app</text>
<text x="170" y="126" font-family="sans-serif" font-size="12" fill="#5F5E5A" text-anchor="middle">IDE agent, curl</text>
<line x1="250" y1="112" x2="414" y2="112" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="420" y="84" width="180" height="56" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.75"/>
<text x="510" y="108" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">claude-fable-5</text>
<text x="510" y="126" font-family="sans-serif" font-size="12" fill="#5F5E5A" text-anchor="middle">full price, every turn</text>

<rect x="40" y="200" width="600" height="360" rx="8" fill="none" stroke="#888780" stroke-width="0.75" stroke-dasharray="6 4"/>
<text x="56" y="224" font-family="sans-serif" font-size="12" fill="#888780">with mesh optimize</text>

<rect x="90" y="240" width="160" height="56" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.75"/>
<text x="170" y="264" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">your app</text>
<text x="170" y="282" font-family="sans-serif" font-size="12" fill="#5F5E5A" text-anchor="middle">mesh_optimize: 0.6</text>
<line x1="250" y1="268" x2="314" y2="268" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="320" y="240" width="160" height="56" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
<text x="400" y="264" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C" text-anchor="middle">classifier</text>
<text x="400" y="282" font-family="sans-serif" font-size="12" fill="#534AB7" text-anchor="middle">routine or complex?</text>

<line x1="400" y1="296" x2="400" y2="324" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="90" y="330" width="540" height="100" rx="8" fill="none" stroke="#888780" stroke-width="0.75" stroke-dasharray="6 4"/>
<text x="106" y="352" font-family="sans-serif" font-size="12" fill="#888780">lever stack (cumulative)</text>
<g font-family="sans-serif" text-anchor="middle">
<rect x="96" y="366" width="96" height="48" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
<text x="144" y="386" font-size="14" font-weight="500" fill="#26215C">cache</text>
<text x="144" y="403" font-size="12" fill="#534AB7">dial 0+</text>
<rect x="204" y="366" width="96" height="48" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
<text x="252" y="386" font-size="14" font-weight="500" fill="#26215C">effort</text>
<text x="252" y="403" font-size="12" fill="#534AB7">dial 0.2+</text>
<rect x="312" y="366" width="96" height="48" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
<text x="360" y="386" font-size="14" font-weight="500" fill="#26215C">compact</text>
<text x="360" y="403" font-size="12" fill="#534AB7">dial 0.4+</text>
<rect x="420" y="366" width="96" height="48" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
<text x="468" y="386" font-size="14" font-weight="500" fill="#26215C">reroute</text>
<text x="468" y="403" font-size="12" fill="#534AB7">dial 0.6+</text>
<rect x="528" y="366" width="96" height="48" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
<text x="576" y="386" font-size="14" font-weight="500" fill="#26215C">batch</text>
<text x="576" y="403" font-size="12" fill="#534AB7">needs hint</text>
</g>

<line x1="520" y1="430" x2="520" y2="464" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="430" y="470" width="180" height="56" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.75"/>
<text x="520" y="494" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">claude-fable-5</text>
<text x="520" y="512" font-family="sans-serif" font-size="12" fill="#5F5E5A" text-anchor="middle">or sonnet if routed</text>

<line x1="430" y1="498" x2="286" y2="498" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="80" y="470" width="200" height="56" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
<text x="180" y="494" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C" text-anchor="middle">response + receipt</text>
<text x="180" y="512" font-family="sans-serif" font-size="12" fill="#0F6E56" text-anchor="middle">tokens + cost saved</text>

<path d="M 80 498 H 56 V 268 H 84" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="90" y="586" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
<text x="112" y="598" font-family="sans-serif" font-size="12" fill="#888780">what mesh does</text>
<rect x="270" y="586" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
<text x="292" y="598" font-family="sans-serif" font-size="12" fill="#888780">what you keep</text>
</svg>
